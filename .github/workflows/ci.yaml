name: CI for Django with Docker Compose
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create environment
        run: |
          echo "DB_HOST=${{ vars.DB_HOST }}" >> .env
          echo "DB_PORT=${{ vars.DB_PORT }}" >> .env
          echo "DEBUG=${{ vars.DEBUG }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ vars.POSTGRES_DB}}" >> .env
          echo "POSTGRES_USER=${{ vars.POSTGRES_USER }}" >> .env
          echo "SMS_AERO_EMAIL=${{ secrets.SMS_AERO_EMAIL }}" >> .env
          echo "SMS_AERO_API_KEY=${{ secrets.SMS_AERO_API_KEY }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          

      - name: Build images
        # Собираем образы, описанные в docker-compose.yml
        run: docker compose build

      - name: Run tests
        # Запускаем тесты внутри собранного контейнера
        run: docker compose run web python manage.py test