services:
  db:
    image: postgres:15
    container_name: beer_shop_db
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: beer_shop_web
    command: >
      sh -c "python manage.py migrate &&
            python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 core.wsgi"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: beer_shop_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /etc/letsencrypt/live/shopbuybeer.ru:/etc/nginx/ssl:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: